<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Personal Budgets</title>
    <!-- Set the theme BEFORE the page paints, so there's no light-mode flash on
         load. Uses the saved choice if there is one, otherwise follows the OS.
         (Theme is a device-specific UI preference, so localStorage is the right
         home for it — unlike your actual data, which lives in the database.) -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem('theme')
          if (t === 'dark' || (!t && matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark')
          }
        } catch (e) {}
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
